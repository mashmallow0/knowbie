<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowbie - Knowledge Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#A78BFA',
                        'primary-dark': '#8B5CF6',
                        secondary: '#F9A8D4',
                        accent: '#FDBA74',
                        mint: '#6EE7B7',
                        cream: '#FEFCE8',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-cream min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3 cursor-pointer" onclick="app.showHome()">
                    <div class="w-10 h-10 bg-secondary rounded-full flex items-center justify-center brain-float">
                        <span class="text-xl">🧠</span>
                    </div>
                    <span class="text-xl font-bold text-gray-700">Knowbie</span>
                </div>
                <div class="flex items-center gap-2 sm:gap-4">
                    <button onclick="app.showHome()" class="text-sm font-medium text-primary hidden sm:block">All Items</button>
                    <button onclick="app.showTags()" class="text-sm font-medium text-gray-500 hover:text-primary hidden sm:block">Tags</button>
                    <button onclick="app.showStats()" class="text-sm font-medium text-gray-500 hover:text-primary">Stats</button>
                    
                    <!-- Export Dropdown -->
                    <div class="relative" id="export-dropdown">
                        <button onclick="app.toggleExportMenu()" class="text-sm font-medium text-gray-500 hover:text-primary flex items-center gap-1">
                            Export
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        <div id="export-menu" class="dropdown-menu hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50">
                            <button onclick="app.exportMarkdown('all')" class="dropdown-item w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                                <span>📄</span> Export All (Markdown)
                            </button>
                            <button onclick="app.exportMarkdown('current')" id="export-current-md" class="dropdown-item w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2 opacity-50 cursor-not-allowed">
                                <span>📃</span> Export Current (Markdown)
                            </button>
                            <div class="border-t border-gray-100 my-1"></div>
                            <button onclick="app.exportPDF('all')" class="dropdown-item w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                                <span>📑</span> Export All (PDF)
                            </button>
                            <button onclick="app.exportPDF('current')" id="export-current-pdf" class="dropdown-item w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2 opacity-50 cursor-not-allowed">
                                <span>📄</span> Export Current (PDF)
                            </button>
                        </div>
                    </div>
                    
                    <!-- Dark Mode Toggle -->
                    <button onclick="app.toggleTheme()" class="theme-toggle" aria-label="Toggle dark mode">
                        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5" stroke-width="2"/>
                            <path stroke-width="2" stroke-linecap="round" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                        </svg>
                        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" stroke-linecap="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                        </svg>
                    </button>
                    
                    <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
                        <span class="text-white text-sm font-medium">A</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <!-- Search Bar -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6 cursor-pointer" onclick="app.showSearchModal()">
            <div class="flex items-center gap-4">
                <span class="text-gray-400 text-xl">🔍</span>
                <span class="flex-1 text-gray-400">Search your knowledge... (AI-powered semantic search)</span>
                <span class="text-xs font-medium text-primary bg-primary/10 px-2 py-1 rounded hidden sm:inline">⌘K</span>
            </div>
        </div>

        <!-- Tag Filters -->
        <div id="tag-filters" class="flex flex-wrap gap-2 sm:gap-3 mb-6 sm:mb-8">
            <button onclick="app.filterByTag('')" class="tag-btn active px-4 sm:px-5 py-2 bg-primary text-white rounded-full text-sm font-medium">All</button>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden text-center py-12">
            <div class="animate-spin w-8 h-8 border-2 border-primary border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-gray-500">Loading your knowledge...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-16">
            <div class="text-6xl mb-4">📚</div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">No knowledge items yet</h3>
            <p class="text-gray-500 mb-6">Start building your knowledge base by adding your first item!</p>
            <button onclick="app.showAddModal()" class="px-6 py-3 bg-primary text-white rounded-full font-medium hover:bg-primary-dark transition-colors">
                + Add Your First Item
            </button>
        </div>

        <!-- Knowledge Grid -->
        <div id="knowledge-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
            <!-- Cards will be rendered here -->
        </div>

        <!-- Stats Footer -->
        <div class="mt-12 text-center">
            <p id="stats-footer" class="text-sm text-gray-400">0 items • 0 tags • Loading...</p>
        </div>
    </div>

    <!-- FAB Button -->
    <button onclick="app.showAddModal()" class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-br from-primary to-primary-dark rounded-full shadow-lg shadow-primary/30 flex items-center justify-center text-white text-2xl sm:text-3xl hover:scale-110 transition-transform z-30">
        +
    </button>

    <!-- Add Knowledge Modal -->
    <div id="add-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-hidden shadow-2xl animate-fade-in">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-xl font-bold text-gray-800">Add Knowledge</h2>
                <button onclick="app.hideAddModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[60vh]">
                <form id="add-form" onsubmit="app.saveKnowledge(event)">
                    <!-- Template Selector -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Template (optional)</label>
                        <select id="template-select" onchange="app.applyTemplate(this.value)" 
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none bg-white">
                            <option value="">-- No template --</option>
                            <option value="meeting">📅 Meeting Notes</option>
                            <option value="code">💻 Code Snippet</option>
                            <option value="book">📚 Book Summary</option>
                            <option value="quick">⚡ Quick Note</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Type</label>
                        <div class="grid grid-cols-4 gap-2">
                            <button type="button" onclick="app.selectType('link')" class="type-btn p-3 rounded-xl border-2 border-transparent hover:border-primary text-center" data-type="link">
                                <span class="text-2xl">🔗</span>
                                <p class="text-xs mt-1">Link</p>
                            </button>
                            <button type="button" onclick="app.selectType('code')" class="type-btn p-3 rounded-xl border-2 border-transparent hover:border-mint text-center" data-type="code">
                                <span class="text-2xl">💻</span>
                                <p class="text-xs mt-1">Code</p>
                            </button>
                            <button type="button" onclick="app.selectType('note')" class="type-btn p-3 rounded-xl border-2 border-transparent hover:border-accent text-center" data-type="note">
                                <span class="text-2xl">📝</span>
                                <p class="text-xs mt-1">Note</p>
                            </button>
                            <button type="button" onclick="app.selectType('image')" class="type-btn p-3 rounded-xl border-2 border-transparent hover:border-secondary text-center" data-type="image">
                                <span class="text-2xl">🖼️</span>
                                <p class="text-xs mt-1">Image</p>
                            </button>
                        </div>
                        <input type="hidden" id="item-type" name="type" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
                        <input type="text" id="item-title" name="title" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"
                               placeholder="Enter a title...">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Content</label>
                        <textarea id="item-content" name="content" rows="4" required
                                  class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none resize-none"
                                  placeholder="Enter content... URL for links, code snippet, or notes"></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tags (comma separated)</label>
                        <input type="text" id="item-tags" name="tags"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"
                               placeholder="ideas, coding, reference...">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Source (optional)</label>
                        <input type="text" id="item-source" name="source"
                               class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"
                               placeholder="URL or reference...">
                    </div>
                    
                    <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-medium hover:bg-primary-dark transition-colors">
                        Save Knowledge
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-start justify-center pt-20 sm:pt-32 px-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full shadow-2xl animate-fade-in overflow-hidden">
            <div class="p-4 border-b border-gray-100 flex items-center gap-4">
                <span class="text-gray-400 text-xl">🔍</span>
                <input type="text" id="search-input" 
                       class="flex-1 text-lg outline-none" 
                       placeholder="Search your knowledge..."
                       oninput="app.performSearch(this.value)">
                <span class="text-xs font-medium text-gray-400 bg-gray-100 px-2 py-1 rounded">ESC</span>
            </div>
            <div id="search-results" class="max-h-96 overflow-y-auto">
                <div class="p-8 text-center text-gray-400">
                    Type to search your knowledge base...
                </div>
            </div>
        </div>
    </div>

    <!-- View Item Modal -->
    <div id="view-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden shadow-2xl animate-fade-in">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span id="view-type-icon" class="text-2xl"></span>
                    <span id="view-type-badge" class="px-3 py-1 rounded-full text-xs font-medium"></span>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="app.editCurrentItem()" class="p-2 text-gray-400 hover:text-primary">
                        ✏️
                    </button>
                    <button onclick="app.deleteCurrentItem()" class="p-2 text-gray-400 hover:text-red-500">
                        🗑️
                    </button>
                    <button onclick="app.hideViewModal()" class="p-2 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                </div>
            </div>
            <div id="view-content" class="p-6 overflow-y-auto max-h-[60vh]">
                <!-- Content will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 right-6 sm:right-8 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <span id="toast-message">Notification</span>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
