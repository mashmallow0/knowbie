<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9A8D4"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
    <linearGradient id="mint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6EE7B7"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDBA74"/>
      <stop offset="100%" style="stop-color:#FB923C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#FEFCE8"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Inter, system-ui" font-size="28" font-weight="bold" fill="#374151">
    Knowbie Architecture Diagram
  </text>
  
  <!-- Client Layer -->
  <g transform="translate(50, 80)">
    <rect width="200" height="140" rx="12" fill="url(#primary)" filter="url(#shadow)"/>
    <text x="100" y="35" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600" fill="white">Browser Client</text>
    <text x="100" y="65" text-anchor="middle" font-family="Inter" font-size="12" fill="white">HTML + Tailwind CSS</text>
    <text x="100" y="85" text-anchor="middle" font-family="Inter" font-size="12" fill="white">Vanilla JavaScript SPA</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter" font-size="11" fill="#E9D5FF">🖥️ Single Page App</text>
  </g>
  
  <!-- Connection Arrow -->
  <g transform="translate(280, 150)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- FastAPI Layer -->
  <g transform="translate(370, 80)">
    <rect width="240" height="140" rx="12" fill="url(#mint)" filter="url(#shadow)"/>
    <text x="120" y="35" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600" fill="#065F46">FastAPI Backend</text>
    <text x="120" y="65" text-anchor="middle" font-family="Inter" font-size="12" fill="#065F46">Jinja2 Templates</text>
    <text x="120" y="85" text-anchor="middle" font-family="Inter" font-size="12" fill="#065F46">Static Files</text>
    <text x="120" y="115" text-anchor="middle" font-family="Inter" font-size="11" fill="#047857">⚡ Python 3.11+</text>
  </g>
  
  <!-- API Routers -->
  <g transform="translate(370, 240)">
    <rect width="110" height="100" rx="8" fill="url(#orange)" filter="url(#shadow)"/>
    <text x="55" y="30" text-anchor="middle" font-family="Inter" font-size="13" font-weight="600" fill="#92400E">Knowledge</text>
    <text x="55" y="50" text-anchor="middle" font-family="Inter" font-size="11" fill="#92400E">/api/knowledge</text>
    <text x="55" y="75" text-anchor="middle" font-family="Inter" font-size="10" fill="#B45309">CRUD Ops</text>
  </g>
  
  <g transform="translate(500, 240)">
    <rect width="110" height="100" rx="8" fill="url(#secondary)" filter="url(#shadow)"/>
    <text x="55" y="30" text-anchor="middle" font-family="Inter" font-size="13" font-weight="600" fill="#9D174D">Search</text>
    <text x="55" y="50" text-anchor="middle" font-family="Inter" font-size="11" fill="#9D174D">/api/search</text>
    <text x="55" y="75" text-anchor="middle" font-family="Inter" font-size="10" fill="#BE185D">AI Semantic</text>
  </g>
  
  <!-- Storage Layer -->
  <g transform="translate(50, 380)">
    <rect width="280" height="160" rx="12" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="2"/>
    <text x="140" y="35" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600" fill="#374151">📁 File Storage</text>
    
    <g transform="translate(20, 60)">
      <rect width="110" height="40" rx="6" fill="white" stroke="#A78BFA" stroke-width="2"/>
      <text x="55" y="25" text-anchor="middle" font-family="Inter" font-size="12" fill="#374151">knowledge.csv</text>
    </g>
    
    <g transform="translate(150, 60)">
      <rect width="110" height="40" rx="6" fill="white" stroke="#6EE7B7" stroke-width="2"/>
      <text x="55" y="25" text-anchor="middle" font-family="Inter" font-size="12" fill="#374151">attachments/</text>
    </g>
    
    <g transform="translate(85, 110)">
      <rect width="110" height="40" rx="6" fill="white" stroke="#FDBA74" stroke-width="2"/>
      <text x="55" y="25" text-anchor="middle" font-family="Inter" font-size="12" fill="#374151">index.json</text>
    </g>
  </g>
  
  <!-- Qdrant Layer -->
  <g transform="translate(370, 380)">
    <rect width="240" height="160" rx="12" fill="url(#secondary)" filter="url(#shadow)"/>
    <text x="120" y="35" text-anchor="middle" font-family="Inter" font-size="16" font-weight="600" fill="#831843">🎯 Qdrant</text>
    <text x="120" y="60" text-anchor="middle" font-family="Inter" font-size="12" fill="#831843">Vector Database</text>
    <text x="120" y="85" text-anchor="middle" font-family="Inter" font-size="11" fill="#BE185D">Collection: knowbie_knowledge</text>
    <text x="120" y="110" text-anchor="middle" font-family="Inter" font-size="11" fill="#BE185D">Vector Size: 384</text>
    <text x="120" y="135" text-anchor="middle" font-family="Inter" font-size="10" fill="#DB2777">Model: all-MiniLM-L6-v2</text>
  </g>
  
  <!-- Flow Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A78BFA"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6EE7B7"/>
    </marker>
    <marker id="arrowhead-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F9A8D4"/>
    </marker>
  </defs>
  
  <!-- API to Storage -->
  <line x1="430" y1="340" x2="190" y2="380" stroke="#6EE7B7" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <!-- API to Qdrant -->
  <line x1="490" y1="340" x2="490" y2="380" stroke="#F9A8D4" stroke-width="2" marker-end="url(#arrowhead-pink)"/>
  
  <!-- Data Flow Labels -->
  <text x="280" y="370" font-family="Inter" font-size="11" fill="#6B7280">CSV Read/Write</text>
  <text x="500" y="370" font-family="Inter" font-size="11" fill="#6B7280">Vector Search</text>
  
  <!-- Data Flow Legend -->
  <g transform="translate(650, 80)">
    <rect width="500" height="460" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="20" y="35" font-family="Inter" font-size="16" font-weight="600" fill="#374151">🔄 Data Flow</text>
    
    <!-- Flow Steps -->
    <g transform="translate(20, 55)">
      <rect width="460" height="55" rx="8" fill="#F3E8FF"/>
      <text x="15" y="25" font-family="Inter" font-size="13" font-weight="500" fill="#6B21A8">1. User creates knowledge item</text>
      <text x="15" y="45" font-family="Inter" font-size="11" fill="#7C3AED">POST /api/knowledge/ → CSV + Qdrant index</text>
    </g>
    
    <g transform="translate(20, 120)">
      <rect width="460" height="55" rx="8" fill="#ECFDF5"/>
      <text x="15" y="25" font-family="Inter" font-size="13" font-weight="500" fill="#065F46">2. List all items</text>
      <text x="15" y="45" font-family="Inter" font-size="11" fill="#047857">GET /api/knowledge/ → Read CSV</text>
    </g>
    
    <g transform="translate(20, 185)">
      <rect width="460" height="55" rx="8" fill="#FEE2E2"/>
      <text x="15" y="25" font-family="Inter" font-size="13" font-weight="500" fill="#991B1B">3. Semantic search</text>
      <text x="15" y="45" font-family="Inter" size="11" fill="#B91C1C">POST /api/search/ → Embed → Qdrant → Results</text>
    </g>
    
    <g transform="translate(20, 250)">
      <rect width="460" height="55" rx="8" fill="#FEF3C7"/>
      <text x="15" y="25" font-family="Inter" font-size="13" font-weight="500" fill="#92400E">4. Filter by tags</text>
      <text x="15" y="45" font-family="Inter" font-size="11" fill="#B45309">Client-side filtering on loaded items</text>
    </g>
    
    <g transform="translate(20, 315)">
      <rect width="460" height="55" rx="8" fill="#E0F2FE"/>
      <text x="15" y="25" font-family="Inter" font-size="13" font-weight="500" fill="#075985">5. View item</text>
      <text x="15" y="45" font-family="Inter" font-size="11" fill="#0369A1">GET /api/knowledge/{id} → Render with type-specific view</text>
    </g>
    
    <g transform="translate(20, 380)">
      <rect width="460" height="55" rx="8" fill="#F3F4F6"/>
      <text x="15" y="25" font-family="Inter" font-size="13" font-weight="500" fill="#374151">6. Delete item</text>
      <text x="15" y="45" font-family="Inter" font-size="11" fill="#4B5563">DELETE /api/knowledge/{id} → CSV + Qdrant cleanup</text>
    </g>
  </g>
  
  <!-- Component Details -->
  <g transform="translate(50, 580)">
    <rect width="1100" height="280" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="20" y="35" font-family="Inter" font-size="16" font-weight="600" fill="#374151">📋 Component Details</text>
    
    <!-- Column 1 -->
    <g transform="translate(20, 55)">
      <rect width="340" height="200" rx="8" fill="#F9FAFB"/>
      <text x="15" y="30" font-family="Inter" font-size="14" font-weight="600" fill="#A78BFA">Frontend (SPA)</text>
      <text x="15" y="55" font-family="Inter" font-size="11" fill="#4B5563">• HTML5 + Tailwind CSS</text>
      <text x="15" y="75" font-family="Inter" font-size="11" fill="#4B5563">• Vanilla JavaScript</text>
      <text x="15" y="95" font-family="Inter" font-size="11" fill="#4B5563">• Card-based Pinterest layout</text>
      <text x="15" y="115" font-family="Inter" font-size="11" fill="#4B5563">• Responsive grid (1/2/3/4 cols)</text>
      <text x="15" y="135" font-family="Inter" font-size="11" fill="#4B5563">• Keyboard shortcuts (⌘K, ESC, N)</text>
      <text x="15" y="155" font-family="Inter" font-size="11" fill="#4B5563">• Modal-based UI</text>
      <text x="15" y="175" font-family="Inter" font-size="11" fill="#4B5563">• Toast notifications</text>
      <text x="15" y="195" font-family="Inter" font-size="11" fill="#4B5563">• Code syntax highlighting</text>
    </g>
    
    <!-- Column 2 -->
    <g transform="translate(380, 55)">
      <rect width="340" height="200" rx="8" fill="#F9FAFB"/>
      <text x="15" y="30" font-family="Inter" font-size="14" font-weight="600" fill="#6EE7B7">Backend (FastAPI)</text>
      <text x="15" y="55" font-family="Inter" font-size="11" fill="#4B5563">• FastAPI + Uvicorn</text>
      <text x="15" y="75" font-family="Inter" font-size="11" fill="#4B5563">• Jinja2 Templates</text>
      <text x="15" y="95" font-family="Inter" font-size="11" fill="#4B5563">• Static file serving</text>
      <text x="15" y="115" font-family="Inter" font-size="11" fill="#4B5563">• RESTful API routes</text>
      <text x="15" y="135" font-family="Inter" font-size="11" fill="#4B5563">• CSV read/write operations</text>
      <text x="15" y="155" font-family="Inter" font-size="11" fill="#4B5563">• File upload handling</text>
      <text x="15" y="175" font-family="Inter" font-size="11" fill="#4B5563">• CORS enabled</text>
      <text x="15" y="195" font-family="Inter" font-size="11" fill="#4B5563">• Health check endpoints</text>
    </g>
    
    <!-- Column 3 -->
    <g transform="translate(740, 55)">
      <rect width="340" height="200" rx="8" fill="#F9FAFB"/>
      <text x="15" y="30" font-family="Inter" font-size="14" font-weight="600" fill="#F9A8D4">Search (Qdrant)</text>
      <text x="15" y="55" font-family="Inter" font-size="11" fill="#4B5563">• Qdrant vector DB</text>
      <text x="15" y="75" font-family="Inter" font-size="11" fill="#4B5563">• sentence-transformers</text>
      <text x="15" y="95" font-family="Inter" font-size="11" fill="#4B5563">• Model: all-MiniLM-L6-v2</text>
      <text x="15" y="115" font-family="Inter" font-size="11" fill="#4B5563">• 384-dim embeddings</text>
      <text x="15" y="135" font-family="Inter" font-size="11" fill="#4B5563">• Cosine similarity search</text>
      <text x="15" y="155" font-family="Inter" font-size="11" fill="#4B5563">• Automatic indexing</text>
      <text x="15" y="175" font-family="Inter" font-size="11" fill="#4B5563">• Fallback local search</text>
      <text x="15" y="195" font-family="Inter" font-size="11" fill="#4B5563">• Search suggestions</text>
    </g>
  </g>
  
  <!-- Color Palette -->
  <g transform="translate(50, 870)">
    <text font-family="Inter" font-size="12" fill="#6B7280">🎨 Color Palette: Primary #A78BFA | Secondary #F9A8D4 | Mint #6EE7B7 | Orange #FDBA74 | Background #FEFCE8</text>
  </g>
</svg>