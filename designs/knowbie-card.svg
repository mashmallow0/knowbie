<svg viewBox="0 0 340 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E8FF"/>
      <stop offset="100%" style="stop-color:#EDE9FE"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#D1FAE5"/>
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="340" height="280" fill="#F9FAFB"/>
  
  <!-- Title -->
  <text x="20" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Card Component Variants</text>
  
  <!-- Link Card -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="300" height="200" rx="16" fill="white" filter="url(#cardShadow)"/>
    <!-- Header with gradient -->
    <rect x="0" y="0" width="300" height="100" rx="16" fill="url(#linkGrad)"/>
    <rect x="0" y="84" width="300" height="16" fill="url(#linkGrad)"/>
    <!-- Type Icon -->
    <text x="20" y="60" font-family="system-ui, sans-serif" font-size="36">🔗</text>
    <!-- Type Badge -->
    <rect x="220" y="16" width="60" height="24" rx="12" fill="#A78BFA"/>
    <text x="250" y="32" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="500">Link</text>
    <!-- Content -->
    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1F2937">FastAPI Best Practices 2024</text>
    <text x="20" y="155" font-family="system-ui, sans-serif" font-size="13" fill="#6B7280">A comprehensive guide to building production-ready APIs with FastAPI...</text>
    <!-- Footer -->
    <text x="20" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#A78BFA">github.com</text>
    <text x="260" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">2d ago</text>
  </g>
  
  <!-- Code Card (Offset for comparison) -->
  <g transform="translate(360, 50)">
    <rect x="0" y="0" width="300" height="200" rx="16" fill="white" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="300" height="100" rx="16" fill="url(#codeGrad)"/>
    <rect x="0" y="84" width="300" height="16" fill="url(#codeGrad)"/>
    <text x="20" y="60" font-family="system-ui, sans-serif" font-size="36">💻</text>
    <rect x="210" y="16" width="70" height="24" rx="12" fill="#6EE7B7"/>
    <text x="245" y="32" font-family="system-ui, sans-serif" font-size="11" fill="#065F46" text-anchor="middle" font-weight="500">Code</text>
    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Docker Compose Template</text>
    <text x="20" y="155" font-family="monospace" font-size="13" fill="#6B7280">version: '3.8'
services:
  app:</text>
    <text x="20" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#A78BFA">Added 2 hours ago</text>
  </g>
  
  <!-- Note Card -->
  <g transform="translate(700, 50)">
    <rect x="0" y="0" width="300" height="200" rx="16" fill="white" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="300" height="100" rx="16" fill="url(#noteGrad)"/>
    <rect x="0" y="84" width="300" height="16" fill="url(#noteGrad)"/>
    <text x="20" y="60" font-family="system-ui, sans-serif" font-size="36">📝</text>
    <rect x="210" y="16" width="70" height="24" rx="12" fill="#FDBA74"/>
    <text x="245" y="32" font-family="system-ui, sans-serif" font-size="11" fill="#92400E" text-anchor="middle" font-weight="500">Note</text>
    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Meeting Notes: Design Sync</text>
    <text x="20" y="155" font-family="system-ui, sans-serif" font-size="13" fill="#6B7280">- New color palette approved
- Timeline updated to Q2
- Action items assigned</text>
    <text x="20" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#A78BFA">Yesterday</text>
  </g>
  
  <!-- Card Anatomy -->
  <g transform="translate(20, 280)">
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">Card Anatomy</text>
    
    <!-- Anatomy lines -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="300" height="140" rx="16" fill="white" stroke="#A78BFA" stroke-width="1" stroke-dasharray="4"/>
      
      <!-- Header area -->
      <rect x="0" y="0" width="300" height="70" rx="16" fill="#F3E8FF" opacity="0.5"/>
      <text x="310" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#A78BFA">Header (type-based color)</text>
      <line x1="300" y1="35" x2="308" y2="35" stroke="#A78BFA" stroke-width="1"/>
      
      <!-- Type badge -->
      <rect x="220" y="12" width="60" height="20" rx="10" fill="#A78BFA"/>
      <text x="310" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#A78BFA">Type badge</text>
      <line x1="280" y1="22" x2="308" y2="22" stroke="#A78BFA" stroke-width="1"/>
      
      <!-- Title -->
      <text x="20" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F2937">Card Title</text>
      <text x="310" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#A78BFA">Title (truncated)</text>
      <line x1="110" y1="96" x2="308" y2="96" stroke="#A78BFA" stroke-width="1"/>
      
      <!-- Preview -->
      <text x="20" y="120" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">Preview text...</text>
      <text x="310" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#A78BFA">2-line preview</text>
      <line x1="110" y1="116" x2="308" y2="116" stroke="#A78BFA" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Type Colors Legend -->
  <g transform="translate(360, 280)">
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#374151">Type Colors</text>
    
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#F3E8FF"/>
      <rect x="0" y="0" width="20" height="20" rx="4" stroke="#A78BFA" stroke-width="1"/>
      <text x="30" y="15" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Link (Purple)</text>
      
      <rect x="0" y="30" width="20" height="20" rx="4" fill="#ECFDF5"/>
      <rect x="0" y="30" width="20" height="20" rx="4" stroke="#6EE7B7" stroke-width="1"/>
      <text x="30" y="45" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Code (Mint)</text>
      
      <rect x="0" y="60" width="20" height="20" rx="4" fill="#FEF3C7"/>
      <rect x="0" y="60" width="20" height="20" rx="4" stroke="#FDBA74" stroke-width="1"/>
      <text x="30" y="75" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Note (Orange)</text>
      
      <rect x="0" y="90" width="20" height="20" rx="4" fill="#FEE2E2"/>
      <rect x="0" y="90" width="20" height="20" rx="4" stroke="#F9A8D4" stroke-width="1"/>
      <text x="30" y="105" font-family="system-ui, sans-serif" font-size="12" fill="#374151">File (Pink)</text>
      
      <rect x="0" y="120" width="20" height="20" rx="4" fill="#E0E7FF"/>
      <rect x="0" y="120" width="20" height="20" rx="4" stroke="#818CF8" stroke-width="1"/>
      <text x="30" y="135" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Idea (Blue)</text>
    </g>
  </g>
</svg>