<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#FEFCE8"/>
  
  <!-- Title -->
  <text x="40" y="50" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#374151">Search Interface</text>
  <text x="40" y="75" font-family="system-ui, sans-serif" font-size="14" fill="#6B7280">AI-powered semantic search with keyboard shortcuts</text>
  
  <!-- Main Search Bar -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="720" height="72" rx="16" fill="white" filter="url(#shadow)"/>
    <text x="24" y="45" font-family="system-ui, sans-serif" font-size="24" fill="#9CA3AF">🔍</text>
    <text x="64" y="45" font-family="system-ui, sans-serif" font-size="18" fill="#374151">docker compose fastapi</text>
    <text x="640" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#A78BFA" font-weight="500">⌘K</text>
    <!-- Cursor -->
    <rect x="315" y="28" width="2" height="24" fill="#A78BFA">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Search Results Dropdown -->
  <g transform="translate(40, 188)">
    <rect x="0" y="0" width="720" height="380" rx="16" fill="white" filter="url(#shadow)"/>
    
    <!-- Header: AI Understanding -->
    <rect x="0" y="0" width="720" height="60" rx="16" fill="#FDF4FF"/>
    <rect x="0" y="44" width="720" height="16" fill="#FDF4FF"/>
    <text x="24" y="38" font-family="system-ui, sans-serif" font-size="14" fill="#7C3AED">✨ AI understands: "Docker setup for FastAPI application"</text>
    
    <!-- Results count -->
    <text x="24" y="88" font-family="system-ui, sans-serif" font-size="13" fill="#6B7280">Found 3 results (semantic match)</text>
    
    <!-- Result 1 (Active) -->
    <g transform="translate(0, 108)">
      <rect x="8" y="0" width="704" height="80" rx="12" fill="#F3E8FF"/>
      <text x="30" y="35" font-family="system-ui, sans-serif" font-size="22">💻</text>
      <text x="70" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Docker Compose Template</text>
      <text x="70" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#6B7280">version: '3.8' services: <tspan fill="#A78BFA" font-weight="500">fastapi</tspan>...</text>
      <text x="620" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#A78BFA">Code</text>
      <text x="670" y="35" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">↵</text>
    </g>
    
    <!-- Result 2 -->
    <g transform="translate(0, 196)">
      <rect x="8" y="0" width="704" height="80" rx="12" fill="white"/>
      <text x="30" y="35" font-family="system-ui, sans-serif" font-size="22">🔗</text>
      <text x="70" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Deploying <tspan fill="#A78BFA">FastAPI</tspan> with <tspan fill="#A78BFA">Docker</tspan></text>
      <text x="70" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#6B7280">A complete guide to containerizing your <tspan fill="#A78BFA">FastAPI</tspan> app...</text>
      <text x="620" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#A78BFA">Link</text>
    </g>
    
    <!-- Result 3 -->
    <g transform="translate(0, 284)">
      <rect x="8" y="0" width="704" height="80" rx="12" fill="white"/>
      <text x="30" y="35" font-family="system-ui, sans-serif" font-size="22">📝</text>
      <text x="70" y="32" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1F2937">Backend Architecture Notes</text>
      <text x="70" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#6B7280">Using <tspan fill="#A78BFA">Docker Compose</tspan> for local development...</text>
      <text x="620" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#A78BFA">Note</text>
    </g>
    
    <!-- Footer shortcuts -->
    <rect x="0" y="340" width="720" height="40" rx="0 0 16 16" fill="#F9FAFB"/>
    <text x="24" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">↑↓ Navigate</text>
    <text x="130" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">↵ Open</text>
    <text x="200" y="365" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">Esc Close</text>
  </g>
  
  <!-- Search States -->
  <g transform="translate(40, 590)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Search States</text>
    
    <!-- State 1: Empty -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="220" height="50" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <text x="15" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#9CA3AF">🔍 Search...</text>
    </g>
    
    <!-- State 2: Typing -->
    <g transform="translate(240, 20)">
      <rect x="0" y="0" width="220" height="50" rx="8" fill="white" stroke="#A78BFA" stroke-width="2"/>
      <text x="15" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#374151">docker com</text>
      <rect x="110" y="18" width="2" height="18" fill="#A78BFA"/>
    </g>
    
    <!-- State 3: Results -->
    <g transform="translate(480, 20)">
      <rect x="0" y="0" width="220" height="50" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
      <text x="15" y="32" font-family="system-ui, sans-serif" font-size="14" fill="#374151">docker compose</text>
      <text x="190" y="32" font-family="system-ui, sans-serif" font-size="12" fill="#10B981">✓</text>
    </g>
  </g>
</svg>