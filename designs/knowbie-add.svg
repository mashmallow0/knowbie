<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="modalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="fabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background (dimmed) -->
  <rect width="800" height="700" fill="#1F2937" opacity="0.5"/>
  
  <!-- Backdrop -->
  <rect x="0" y="0" width="800" height="700" fill="#000000" opacity="0.3"/>
  
  <!-- Add Modal -->
  <g transform="translate(200, 100)">
    <rect x="0" y="0" width="400" height="500" rx="20" fill="white" filter="url(#modalShadow)"/>
    
    <!-- Header -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="400" height="80" rx="20" fill="#FDF4FF"/>
      <rect x="0" y="64" width="400" height="16" fill="#FDF4FF"/>
      <text x="30" y="50" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#374151">Add Knowledge</text>
      <text x="340" y="50" font-family="system-ui, sans-serif" font-size="20" fill="#9CA3AF">✕</text>
    </g>
    
    <!-- Content Type Selector -->
    <g transform="translate(30, 100)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#6B7280">What are you adding?</text>
      
      <!-- Type options -->
      <g transform="translate(0, 15)">
        <!-- Link (Selected) -->
        <rect x="0" y="0" width="76" height="76" rx="12" fill="#F3E8FF" stroke="#A78BFA" stroke-width="2"/>
        <text x="38" y="45" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle">🔗</text>
        <text x="38" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#7C3AED" text-anchor="middle">Link</text>
        
        <!-- Note -->
        <rect x="88" y="0" width="76" height="76" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <text x="126" y="45" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle">📝</text>
        <text x="126" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Note</text>
        
        <!-- Code -->
        <rect x="176" y="0" width="76" height="76" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <text x="214" y="45" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle">💻</text>
        <text x="214" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Code</text>
        
        <!-- File -->
        <rect x="264" y="0" width="76" height="76" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
        <text x="302" y="45" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle">📎</text>
        <text x="302" y="68" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">File</text>
      </g>
    </g>
    
    <!-- Input Fields -->
    <g transform="translate(30, 215)">
      <!-- URL Input -->
      <text x="0" y="0" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#6B7280">URL</text>
      <rect x="0" y="10" width="340" height="48" rx="10" fill="#F9FAFB" stroke="#A78BFA" stroke-width="2"/>
      <text x="16" y="40" font-family="system-ui, sans-serif" font-size="14" fill="#374151">https://github.com/example</text>
      
      <!-- Title Input -->
      <text x="0" y="85" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#6B7280">Title (auto-fetched)</text>
      <rect x="0" y="95" width="340" height="48" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
      <text x="16" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#374151">FastAPI Best Practices 2024</text>
      
      <!-- Tags Input -->
      <text x="0" y="170" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#6B7280">Tags</text>
      <rect x="0" y="180" width="340" height="48" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
      <rect x="12" y="192" width="70" height="24" rx="12" fill="#A78BFA"/>
      <text x="47" y="208" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">💻 Code</text>
      <rect x="90" y="192" width="70" height="24" rx="12" fill="#6EE7B7"/>
      <text x="125" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#065F46" text-anchor="middle">🚀 API</text>
      <text x="170" y="208" font-family="system-ui, sans-serif" font-size="14" fill="#9CA3AF">+ Add tag</text>
    </g>
    
    <!-- Footer Buttons -->
    <g transform="translate(30, 420)">
      <rect x="0" y="0" width="160" height="44" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <text x="80" y="29" font-family="system-ui, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">Cancel</text>
      
      <rect x="180" y="0" width="160" height="44" rx="10" fill="url(#fabGrad)"/>
      <text x="260" y="29" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="500">Save Knowledge</text>
    </g>
  </g>
  
  <!-- Modal States (shown at bottom) -->
  <g transform="translate(50, 620)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Modal States</text>
    
    <!-- State labels -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="180" height="60" rx="8" fill="white" opacity="0.1"/>
      <text x="90" y="35" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">Type Selection</text>
    </g>
    
    <g transform="translate(200, 20)">
      <rect x="0" y="0" width="180" height="60" rx="8" fill="white" opacity="0.3"/>
      <text x="90" y="35" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">Form Active</text>
    </g>
    
    <g transform="translate(400, 20)">
      <rect x="0" y="0" width="180" height="60" rx="8" fill="white" opacity="0.1"/>
      <text x="90" y="35" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">Saving...</text>
    </g>
    
    <g transform="translate(600, 20)">
      <rect x="0" y="0" width="100" height="60" rx="8" fill="#10B981"/>
      <text x="50" y="35" font-family="system-ui, sans-serif" font-size="12" fill="white" text-anchor="middle">✓ Success</text>
    </g>
  </g>
  
  <!-- FAB Button (context) -->
  <g transform="translate(680, 560)">
    <circle cx="40" cy="40" r="40" fill="url(#fabGrad)"/>
    <text x="40" y="52" font-family="system-ui, sans-serif" font-size="32" fill="white" text-anchor="middle">+</text>
  </g>
</svg>